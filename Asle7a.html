                        /* إعدادات الخلفية الغامضة */

                                                                                                    }

                                                                                                            h1 {

                                                                                                                                                                                        /* حاوية الشبكة - جعلناها أصغر قليلاً */
                                                                                                                                                                                                .grid-container {
                                                                                                                                                                                                            display: grid;
                                                                                                                                                                                                                        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); /* تصغير الحد الأدنى للعرض */

                                                                                                                                                                                                                                                max-width: 1100px;
                                                                                                                                                                                                                                                            margin: 0 auto;
                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                            /* تصميم المربع الصغير */
                                                                                                                                                                                                                                                                                    .photo-card {
                                                                                                                                                                                                                                                                                                background: rgba(15, 15, 15, 0.9);
                                                                                                                                                                                                                                                                                                            border: 1px solid #222;
                                                                                                                                                                                                                                                                                                                        border-radius: 10px;
                                                                                                                                                                                                                                                                                                                                    overflow: hidden;
                                                                                                                                                                                                                                                                                                                                                transition: all 0.3s ease;
                                                                                                                                                                                                                                                                                                                                                            box-shadow: 0 5px 15px rgba(0,0,0,0.7);
                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                            .photo-card:hover {
                                                                                                                                                                                                                                                                                                                                                                                        border-color: #00ff00; /* توهج أخضر */
                                                                                                                                                                                                                                                                                                                                                                                                    transform: translateY(-5px);

                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                /* جعل منطقة الصورة مربعة وصغيرة */
                                                                                                                                                                                                                                                                                                                                                                                                                                        .image-wrapper {
                                                                                                                                                                                                                                                                                                                                                                                                                                                    width: 100%;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                aspect-ratio: 1 / 1;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            overflow: hidden;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            .image-wrapper img {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        width: 100%;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    height: 100%;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                object-fit: cover;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            filter: brightness(0.8);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        transition: 0.5s;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .photo-card:hover img {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    filter: brightness(1);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                transform: scale(1.1);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
