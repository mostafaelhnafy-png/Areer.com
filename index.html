<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طريق الحرير</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: black;
            color: red;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            color: #8B0000;
            margin-bottom: 30px;
            text-shadow: 0 0 20px red;
            animation: flicker 2s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            95% { opacity: 1; }
            96% { opacity: 0.2; }
            97% { opacity: 1; }
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .card {
            background: #111;
            border: 2px solid #8B0000;
            text-decoration: none;
            color: white;
            display: block;
            overflow: hidden;
        }

        .card:hover {
            border-color: red;
            box-shadow: 0 0 20px red;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            filter: grayscale(100%);
            transition: 0.3s;
        }

        .card:hover img {
            filter: grayscale(0%);
        }

        .card h3 {
            padding: 10px;
            color: #8B0000;
        }

        /* طبقة الدم */
        .blood-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #8B0000;
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
            transition: 0.1s;
        }

        .blood-overlay.show {
            opacity: 0.7;
        }

        /* قطرات الدم */
        .blood-drop {
            position: fixed;
            width: 5px;
            height: 20px;
            background: #8B0000;
            filter: blur(2px);
            z-index: 1001;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .gallery { grid-template-columns: repeat(2, 1fr); }
            h1 { font-size: 2.5rem; }
        }

        @media (max-width: 480px) {
            .gallery { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- طبقة الدم -->
    <div class="blood-overlay" id="bloodOverlay"></div>

    <!-- الأصوات المرعبة (روابط مباشرة لأصوات حقيقية) -->
    <audio id="sound1" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
    </audio>
    <audio id="sound2" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-06.mp3" type="audio/mpeg">
    </audio>
    <audio id="sound3" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-07.mp3" type="audio/mpeg">
    </audio>
    <audio id="sound4" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-08.mp3" type="audio/mpeg">
    </audio>
    <audio id="sound5" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-09.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>طريق الحرير</h1>
        
        <div class="gallery">
            <a href="index1.html" target="_blank" class="card" data-index="1">
                <img"A3daa.jpg" alt="صورة">
                <h3>تجارة الاعضاء</h3>
            </a>

            <a href="Asle7a.html" target="_blank" class="card" data-index="2">
                <img src="Asl7a.jpg" alt="صورة">
                <h3>تجارة الاسلحة</h3>
            </a>

            <a href="مخديرات.html" target="_blank" class="card" data-index="3">
                <img src="Mo77.jpg" alt="صورة">
                <h3>تجارة المخديرات</h3>
            </a>

            <a href="#" target="_blank" class="card" data-index="4">
                <img src="Abed.jpg" alt="صورة">
                <h3>تجارة العبيد</h3>
            </a>
        </div>
    </div>

    <script>
        // عناصر الصفحة
        const cards = document.querySelectorAll('.card');
        const bloodOverlay = document.getElementById('bloodOverlay');
        
        // جميع الأصوات
        const sound1 = document.getElementById('sound1');
        const sound2 = document.getElementById('sound2');
        const sound3 = document.getElementById('sound3');
        const sound4 = document.getElementById('sound4');
        const sound5 = document.getElementById('sound5');
        
        const sounds = [sound1, sound2, sound3, sound4, sound5];

        // تفعيل الصوت عند أول تفاعل مع الصفحة
        function enableAudio() {
            // تشغيل صوت قصير جداً بكتم شديد لفتح قناة الصوت
            const silentSound = sounds[0];
            silentSound.volume = 0.01;
            silentSound.play()
                .then(() => {
                    console.log('الصوت مفعل');
                    // إيقاف الصوت فوراً
                    silentSound.pause();
                    silentSound.currentTime = 0;
                })
                .catch(e => console.log('لم يتم تفعيل الصوت بعد'));
        }

        // محاولة تفعيل الصوت عند أي حركة أو نقرة
        document.addEventListener('mousemove', enableAudio, { once: true });
        document.addEventListener('click', enableAudio, { once: true });
        document.addEventListener('touchstart', enableAudio, { once: true });

        // تشغيل صوت عشوائي
        function playRandomSound() {
            const randomIndex = Math.floor(Math.random() * sounds.length);
            const sound = sounds[randomIndex];
            
            // إعادة تعيين الصوت
            sound.currentTime = 0;
            sound.volume = 0.8; // صوت عالٍ
            
            // تشغيل الصوت
            const playPromise = sound.play();
            
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log('لم يتم تشغيل الصوت، نحاول مرة أخرى');
                    // محاولة تشغيل صوت آخر
                    setTimeout(() => {
                        const backupSound = sounds[0];
                        backupSound.currentTime = 0;
                        backupSound.volume = 0.5;
                        backupSound.play().catch(e => {});
                    }, 100);
                });
            }
        }

        // إنشاء قطرات دم
        function createBloodDrops() {
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const drop = document.createElement('div');
                    drop.className = 'blood-drop';
                    drop.style.left = Math.random() * 100 + '%';
                    drop.style.top = '-20px';
                    drop.style.animation = `fall ${Math.random() * 1 + 0.5}s linear forwards`;
                    document.body.appendChild(drop);
                    
                    setTimeout(() => drop.remove(), 2000);
                }, i * 30);
            }
        }

        // إضافة حركة السقوط
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fall {
                to {
                    transform: translateY(100vh);
                }
            }
        `;
        document.head.appendChild(style);

        // تأثير الدم
        function showBloodEffect() {
            // طبقة الدم
            bloodOverlay.classList.add('show');
            
            // قطرات الدم
            createBloodDrops();
            
            // تشغيل صوت
            playRandomSound();
            
            // اختفاء الدم بعد نصف ثانية
            setTimeout(() => {
                bloodOverlay.classList.remove('show');
            }, 500);
        }

        // عند النقر على الصور
        cards.forEach(card => {
            card.addEventListener('click', (e) => {
                // تطبيق تأثير الدم
                showBloodEffect();
                
                // اهتزاز خفيف للصفحة
                document.body.style.transform = 'translateX(3px)';
                setTimeout(() => document.body.style.transform = 'translateX(-3px)', 30);
                setTimeout(() => document.body.style.transform = 'translateX(3px)', 60);
                setTimeout(() => document.body.style.transform = 'translateX(0)', 90);
                
                // الرابط سيفتح بشكل طبيعي
                // لا نستخدم preventDefault
            });
        });

        // اختبار الصوت عند تحميل الصفحة
        window.addEventListener('load', () => {
            console.log('الصفحة جاهزة، انتظر التفاعل لتشغيل الصوت');
        });
    </script>
</body>
</html>
