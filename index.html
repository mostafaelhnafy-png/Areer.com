<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☆ طريق الحرير ☆</title>
</head>
<style>
/* تنسيق الموقع بالكامل */
* {
    margin: 0;
        padding: 0;
            box-sizing: border-box;
            }

            body {
                /* جعل أي نص في الموقع باللون الأبيض */
                    color: #ffffff;
                        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                            min-height: 100vh;
                                overflow-x: hidden;
                                    
                                        /* الخلفية الحيوية: تدرج متحرك بين الأسود والأخضر الداكن والأحمر الداكن */
                                            background: linear-gradient(135deg, #000000, #0a1f0a, #1a0505, #000000);
                                                background-size: 400% 400%;
                                                    animation: gradientMove 15s ease infinite;
                                                        position: relative;
                                                        }

                                                        /* حركة الخلفية لتبدو حيوية */
                                                        @keyframes gradientMove {
                                                            0% { background-position: 0% 50%; }
                                                                50% { background-position: 100% 50%; }
                                                                    100% { background-position: 0% 50%; }
                                                                    }

                                                                    /* طبقة الغموض والضوضاء (Noise Texture) */
                                                                    body::after {
                                                                        content: "";
                                                                            position: fixed;
                                                                                top: 0; left: 0;
                                                                                    width: 100%; height: 100%;
                                                                                        /* تأثير حبيبات الفيلم القديم لزيادة الأناقة */
                                                                                            background-image: url('https://www.transparenttextures.com');
                                                                                                opacity: 0.15;
                                                                                                    pointer-events: none;
                                                                                                        z-index: 1;
                                                                                                        }

                                                                                                        /* تنسيق العناوين والنصوص لضمان البروز */
                                                                                                        h1, h2, h3, p {
                                                                                                            position: relative;
                                                                                                                z-index: 2; /* لتكون فوق طبقة الضوضاء */
                                                                                                                    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5); /* ظل خفيف ليبرز النص الأبيض */
                                                                                                        }
                                                                                                        h1 {
                                                                                                                text-align: center;
                                                                                                                    width: 100%;
                                                                                                                    }
                                                                                                                    h2 {
                                                                                                                            text-align: right;
                                                                                                                                direction: rtl;
                                                                                                                                }
                                                                                                                                .container {
                                                                                                                                        position: fixed; /* لجعلها ثابتة أعلى الشاشة حتى عند التمرير */
                                                                                                                                            top: 10px;       /* المسافة من الأعلى */
                                                                                                                                                right: 10px;     /* المسافة من اليمين */
                                                                                                                                                    display: flex;
                                                                                                                                                        flex-direction: column; /* لترتيب الأزرار تحت بعضها */
                                                                                                                                                            gap: 8px;        /* المسافة بين الأزرار */
                                                                                                                                                                z-index: 1000;   /* لضمان ظهورها فوق باقي العناصر */
                                                                                                                                                                }

                                                                                                                                

                                                                                                                                

/* تنسيق الحاوية (div) */
.nav-container {
    background-color: transparent; /* إزالة الخلفية لتظهر خلفية الموقع */
        display: flex; 
            justify-content: space-between; /* توزيع الروابط من الحافة للحافة بمسافات متساوية */
                align-items: center; 
                    padding: 20px 50px; /* إضافة مساحة داخلية جانبية بسيطة لكي لا تلتصق الروابط بالشاشة تماماً */
                        width: 100%;
                            box-sizing: border-box; /* لضمان عدم خروج الحاوية عن عرض الشاشة بسبب الـ padding */
                            }

                            /* تنسيق الروابط (a) */
                            .nav-container a {
                                color: #ffffff; /* لون أبيض ناصع */
                                    text-decoration: none; /* إزالة الخط */
                                        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                                            font-size: 1.1rem;
                                                font-weight: 500;
                                                    transition: color 0.3s ease;
                                                    }

                                                    /* تأثير التمرير */
                                                    .nav-container a:hover {
                                                        color: #adb5bd; /* رمادي فاتح جداً عند التمرير ليتناسب مع الأسود */
                                                        }
.img{
    display:flex;
    gap:100px;
}
</style>
<body>
  <h1>☆ طريق الحرير ☆</h1>
  <h1>موقع طريق الحرير لتجاره جميع انواع الاعضاء والاسلحه والمخدرات</h1>
  <h2>تتم هنا عمليات بيع الاعضاء</h2>
  <h2>وايضا بيع الاسلحه الحربيه </h2>
  <h2>ويتم بيع جميع انواع المخديرات</h2>
  <h2>وايضا لتجارة العبيد</h2>
  <div class="container">
    <button>تسجيل الدخول</button>
    <button>انشاء حساب</button>
  </div>
  <div class="nav-container">
    <a href="#">تجارة الاعضاء</a>
    <a href="#">تخارة الاسلحة</a>
    <a href="#">تجارة المخديرات</a>
    <a href="#">تجارة العبيد</a>
  </div>
  <div class="img">
    <a href="#">
<img src="A3daa.jpg">
</a>
<a href="#">
<img src="Asl7a.jpg">
</a>
<a href="#">
<img src="Mo7.jpg">
</a>
<a href="#">
<img src="Abed.jpg">
</a>
  </div>
</body>
</html>
